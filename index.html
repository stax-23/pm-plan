// ===== AUTH =====
let _ltab='in';
function lTab(t){
  _ltab=t;
  document.getElementById('ltab-in').classList.toggle('active',t==='in');
  document.getElementById('ltab-up').classList.toggle('active',t==='up');
  document.getElementById('l-btn').textContent=t==='in'?'Accedi':'Crea account';
  document.getElementById('l-pwd2-row').style.display=t==='up'?'':'none';
  lMsg('','');
}
function _getTab(){
  // Legge lo stato reale dal DOM — immune a reinizializzazioni della variabile
  const upActive=document.getElementById('ltab-up')?.classList.contains('active');
  return upActive?'up':'in';
}
function lMsg(type,text){
  const el=document.getElementById('lmsg');
  if(!text){el.style.display='none';el.textContent='';return;}
  el.className='lmsg '+type;
  el.textContent=text;
  el.style.display='block';
}
function lErrMap(e){
  const m=(e.message||'').toLowerCase();
  if(m.includes('invalid login credentials')||m.includes('invalid_credentials'))return 'Email o password errata.';
  if(m.includes('email not confirmed'))return 'Conferma la tua email prima di accedere.';
  if(m.includes('user already registered'))return 'Email gia registrata. Usa Accedi.';
  if(m.includes('too many'))return 'Troppi tentativi. Riprova tra qualche minuto.';
  if(m.includes('email_not_allowed')||m.includes('not_allowed'))return 'Email non autorizzata. Contatta l amministratore.';
  if(m.includes('database error'))return 'Email non autorizzata. Contatta l amministratore.';
  return e.message||'Errore. Riprova.';
}
async function lSubmit(){
  const email=(document.getElementById('l-email').value||'').trim().toLowerCase();
  const pwd=document.getElementById('l-pwd').value||'';
  const pwd2=(document.getElementById('l-pwd2').value||'');
  const btn=document.getElementById('l-btn');
  const tab=_getTab(); _ltab=tab;
  const label=tab==='in'?'Accedi':'Crea account';
  lMsg('','');
  if(!email||!pwd){lMsg('err','Inserisci email e password.');return;}
  if(tab==='up'&&pwd.length<6){lMsg('err','Password minimo 6 caratteri.');return;}
  if(tab==='up'&&pwd!==pwd2){lMsg('err','Le password non coincidono.');return;}
  btn.textContent='...';btn.disabled=true;
  try{
    if(tab==='up'){
      let wlOk=true;
      try{
        const r=await Promise.race([
          _SB.from('allowed_emails').select('email').eq('email',email).maybeSingle(),
          new Promise(function(_,rej){setTimeout(function(){rej(new Error('t'));},5000);})
        ]);
        if(!r.error&&r.data===null)wlOk=false;
      }catch(_){}
      if(!wlOk){lMsg('err',"Email non autorizzata. Contatta l'amministratore.");return;}
      const up=await _SB.auth.signUp({email:email,password:pwd});
      if(up.error)throw up.error;
      if(up.data.user&&!up.data.session){
        lMsg('info',"Registrazione ok! Controlla la tua email e poi accedi.");return;
      }
    }else{
      const si=await _SB.auth.signInWithPassword({email:email,password:pwd});
      if(si.error)throw si.error;
    }
    // Login/signup riuscito: carica i dati direttamente con getSession
    const gs=await _SB.auth.getSession();
    if(gs.data&&gs.data.session&&gs.data.session.user){
      _u=gs.data.session.user;
      _hasRow=null;
      await load();
      if(S.workspaces.length&&!S.workspaces.find(function(w){return w.id===S.activeWs;})){
        S.activeWs=S.workspaces[0].id;
      }
      _showApp(_u);
    }
  }catch(e){
    console.error('[PMP auth]',e.message,e.code);
    lMsg('err',lErrMap(e));
  }finally{
    // Riabilita sempre il bottone
    const b=document.getElementById('l-btn');
    if(b){b.textContent=label;b.disabled=false;}
  }
}

async function lOut(){
  if(_pendingSave){
    const el=document.getElementById('sync-status');
    if(el){el.textContent='Salvataggio...';el.style.color='rgba(255,200,80,.9)';}
    await saveNow();
  }
  _pendingSave=false;
  _hasRow=null;
  await _SB.auth.signOut();
  // _showLogin viene chiamato da onAuthStateChange SIGNED_OUT
}

function rUpill(){
  const el=document.getElementById('u-pill');
  if(!el||!_u)return;
  const av=(_u.email||'??').substring(0,2).toUpperCase();
  el.innerHTML='<div class="upill" onclick="lOut()" title="Clicca per uscire"><div class="upill-av">'+av+'</div><span class="upill-em">'+(_u.email||'')+'</span></div>';
}

  if(_pendingSave){
    e.preventDefault();

  }

// ══════════ MEETING NOTES ════════════════════════════════════════════════
function rMeetings(proj,c,tb){
  const mtgs=(proj.meetings||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  tb.innerHTML=`<button class="btn btnp bsm" onclick="openMtgModal('${proj.id}',-1)">＋ Nuova Nota Meeting</button>`;

  if(!mtgs.length){
    c.innerHTML=`<div class="phd"><div><h1>Meeting Notes</h1><p>Note dei meeting di progetto</p></div></div>
      <div class="empty"><div class="empty-icon">📝</div><p>Nessuna nota. Clicca "＋ Nuova Nota Meeting" per iniziare.</p></div>`;
    return;
  }

  // Dropdown selezione meeting
  const selOpts=mtgs.map((m,i)=>`<option value="${i}">${m.date} — ${m.title||'Meeting'}</option>`).join('');
  const selectedIdx=window._mtgSelIdx||0;
  const sel=mtgs[selectedIdx]||mtgs[0];

  c.innerHTML=`<div class="phd"><div><h1>Meeting Notes</h1><p>${mtgs.length} meeting documentat${mtgs.length===1?'o':'i'}</p></div></div>
  <div style="display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start">
    <!-- Lista meeting -->
    <div class="card">
      <div class="banner"><h3>📋 Meeting</h3></div>
      <div style="padding:8px">
        ${mtgs.map((m,i)=>`<div onclick="selMtg(${i})" style="padding:10px 12px;border-radius:var(--rs);cursor:pointer;margin-bottom:4px;background:${i===selectedIdx?'var(--sa)':'transparent'};color:${i===selectedIdx?'#fff':'var(--tx)'};transition:background .15s">
          <div style="font-weight:600;font-size:13px">${m.title||'Meeting'}</div>
          <div style="font-size:11.5px;opacity:.75;margin-top:2px">${m.date||'—'}</div>
        </div>`).join('')}
      </div>
    </div>
    <!-- Contenuto meeting selezionato -->
    <div class="card">
      <div class="banner">
        <h3>${sel.date||'—'} — ${sel.title||'Meeting'}</h3>
        <span class="badd" onclick="openMtgModal('${proj.id}',${selectedIdx})">✏ Modifica</span>
        <span class="badd" style="margin-left:4px" onclick="delMtg('${proj.id}',${selectedIdx})">✕</span>
      </div>
      <div style="padding:20px">
        ${sel.attendees?`<p style="font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Partecipanti</p><p style="font-size:13px;margin-bottom:14px">${sel.attendees}</p>`:''}
        <div class="rt-view">${sel.content||'<span style="color:var(--tl);font-style:italic">Nessun contenuto</span>'}</div>
      </div>
    </div>
  </div>`;
}

function selMtg(idx){
  window._mtgSelIdx=idx;
  rContent();
}

function openMtgModal(pid,idx){
  const proj=wsProjects().find(p=>p.id===pid);
  if(!proj.meetings)proj.meetings=[];
  const isN=idx===-1;
  const m=isN?{date:new Date().toISOString().slice(0,10),title:'',attendees:'',content:''}:{...proj.meetings[idx]};
  const mid='mmtg';
  $('modals').insertAdjacentHTML('beforeend',`<div class="mo" id="${mid}"><div class="modal mxl">
    <div class="mhd"><h2>${isN?'Nuova':'Modifica'} Nota Meeting</h2><button class="cx" onclick="cm('${mid}')">✕</button></div>
    <div class="mbody">
      <div class="fg fg2" style="margin-bottom:16px">
        <div class="field"><label>Data Meeting</label><input type="date" id="mt_date" value="${m.date||''}"/></div>
        <div class="field"><label>Titolo / Oggetto</label><input type="text" id="mt_title" value="${(m.title||'').replace(/"/g,'&quot;')}" placeholder="es. Sprint Review, Steering Committee..."/></div>
        <div class="field" style="grid-column:1/-1"><label>Partecipanti</label><input type="text" id="mt_att" value="${(m.attendees||'').replace(/"/g,'&quot;')}" placeholder="es. Mario Rossi, Anna Verdi..."/></div>
      </div>
      <div class="field">
        <label>Note del Meeting</label>
        ${rtEditor('mt_content',m.content||'','• Scrivi qui le note del meeting...\n• Usa i bottoni per formattare\n• Puoi usare elenchi puntati e numerati')}
      </div>
    </div>
    <div class="mft"><button class="btn btng" onclick="cm('${mid}')">Annulla</button>
      <button class="btn btnp" onclick="saveMtg('${pid}',${idx},'${mid}')">Salva Note</button></div>
  </div></div>`);
}

function saveMtg(pid,idx,mid){
  const proj=wsProjects().find(p=>p.id===pid);
  if(!proj.meetings)proj.meetings=[];
  const m={date:gv('mt_date'),title:gv('mt_title'),attendees:gv('mt_att'),content:rtValue('mt_content')};
  if(idx===-1){proj.meetings.push(m);window._mtgSelIdx=0;}
  else proj.meetings[idx]=m;
  save();cm(mid);rContent();toast('Note salvate');
}

function delMtg(pid,idx){
  cdel('Eliminare questo meeting e le relative note?',()=>{
    wsProjects().find(p=>p.id===pid).meetings.splice(idx,1);
    window._mtgSelIdx=0;
    save();rContent();toast('Eliminato','🗑');
  });
}


// ===== INIT =====
window.addEventListener('beforeunload',function(e){
  if(_pendingSave){e.preventDefault();e.returnValue='';}
});

// _showApp e _showLogin sono funzioni globali accessibili da lSubmit e onAuthStateChange
function _showApp(user){
  _u=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  rUpill();rWsSel();rSidebar();rSecNav();rTopbar();rContent();
  sbSaved(true);
}
function _showLogin(){
  _u=null;
  _hasRow=null;
  S={workspaces:[],activeWs:null,activeProj:null,sec:'dashboard'};
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

// onAuthStateChange gestisce SOLO logout e refresh token silenzioso
// Login e caricamento iniziale sono gestiti direttamente da lSubmit e getSession()
_SB.auth.onAuthStateChange(function(event,session){
  console.log('[PMP] auth event:',event,'user:',(session&&session.user?session.user.email:'none'));
  if(event==='SIGNED_OUT'||event==='USER_DELETED'){
    _showLogin();
    return;
  }
  if(event==='TOKEN_REFRESHED'){
    if(session&&session.user)_u=session.user;
    return;
  }
  // Tutti gli altri eventi (SIGNED_IN, INITIAL_SESSION) ignorati —
  // gestiti direttamente da getSession() qui sotto o da lSubmit
});

// Controlla sessione esistente al caricamento (gestisce CTRL+R)
(async function(){
  try{
    var gs=await _SB.auth.getSession();
    if(gs.data&&gs.data.session&&gs.data.session.user){
      _u=gs.data.session.user;
      await load();
      if(S.workspaces.length&&!S.workspaces.find(function(w){return w.id===S.activeWs;})){
        S.activeWs=S.workspaces[0].id;
      }
      _showApp(_u);
    }else{
      _showLogin();
    }
  }catch(e){
    console.error('[PMP] init error:',e);
    _showLogin();
  }
}());
</script>
